<div class="p-3">
  <div clas="card-body">
    <table class="table">
     <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>price</th>
        <th>selected</th>
      </tr>
     </thead>
      @if (products){
        <tbody>
          @for (p of products ; track p){
            <tr>
              <td>{{p.id}}</td>
              <td>{{p.name}}</td>
              <td>{{p.price}}</td>
              <td>
                @if (p.selected){
                <i class="bi bi-check-circle"></i>
                } @else {
                <i class="bi bi-circle"></i>
                }
              </td>
            </tr>
          }
        </tbody>
      }

    </table>
  </div>
</div>
